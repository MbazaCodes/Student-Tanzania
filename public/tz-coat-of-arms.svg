<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 140" width="120" height="140">
  <!-- Shield shape -->
  <path d="M10,10 L110,10 L110,90 Q60,130 10,90 Z" fill="#1B8F3A" stroke="#003366" stroke-width="3"/>
  <!-- Gold diagonal band -->
  <path d="M10,10 L110,10 L110,50 L10,70 Z" fill="#F5C400"/>
  <path d="M10,70 L110,50 L110,90 Q60,130 10,90 Z" fill="#003366"/>
  <!-- Mount Kilimanjaro (white peak) -->
  <polygon points="35,55 55,30 75,55" fill="white" stroke="#ccc" stroke-width="0.5"/>
  <polygon points="45,55 55,38 65,55" fill="#e8e8e8"/>
  <!-- Axe and hoe (crossed tools) -->
  <line x1="42" y1="72" x2="58" y2="56" stroke="#F5C400" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="78" y1="72" x2="62" y2="56" stroke="#F5C400" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Torch flame -->
  <ellipse cx="60" cy="20" rx="5" ry="7" fill="#F5C400"/>
  <ellipse cx="60" cy="23" rx="3" ry="4" fill="#FF6B00"/>
  <!-- Supporters: Warrior figures (simplified) -->
  <ellipse cx="18" cy="78" rx="6" ry="10" fill="#8B4513" opacity="0.7"/>
  <ellipse cx="102" cy="78" rx="6" ry="10" fill="#8B4513" opacity="0.7"/>
  <!-- Base banner -->
  <rect x="8" y="105" width="104" height="20" rx="3" fill="#003366"/>
  <text x="60" y="119" font-family="serif" font-size="7" fill="#F5C400" text-anchor="middle" font-weight="bold">UHURU NA UMOJA</text>
  <!-- Stars on banner -->
  <text x="20" y="118" font-size="8" fill="#F5C400">★</text>
  <text x="95" y="118" font-size="8" fill="#F5C400">★</text>
</svg>
